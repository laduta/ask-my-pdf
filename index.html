<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask My PDF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 20px 24px;
    }

    .header h1 { font-size: 1.4rem; }
    .header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

    .upload-section {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upload-section input[type="file"] { display: none; }

    .upload-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .upload-btn:hover { background: #4338ca; }
    .upload-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .file-label {
      font-size: 0.85rem;
      color: #6b7280;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 20px;
      margin-left: auto;
      white-space: nowrap;
    }

    .status.ready    { background: #d1fae5; color: #065f46; }
    .status.loading  { background: #fef3c7; color: #92400e; }
    .status.error    { background: #fee2e2; color: #991b1b; }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .message.user {
      background: #4f46e5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #f3f4f6;
      color: #111827;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.bot .chunks {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 6px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      gap: 8px;
    }

    .empty-state span { font-size: 2.5rem; }
    .empty-state p    { font-size: 0.9rem; }

    .input-section {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .input-section input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
    }

    .input-section input:focus { border-color: #4f46e5; }

    .send-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .send-btn:hover    { background: #4338ca; }
    .send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .typing {
      background: #f3f4f6;
      color: #6b7280;
      align-self: flex-start;
      padding: 12px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 Ask My PDF</h1>
      <p>Upload a PDF and chat with it using AI</p>
    </div>

    <div class="upload-section">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        Upload PDF
      </button>
      <input type="file" id="fileInput" accept=".pdf" onchange="uploadPDF(this)" />
      <span class="file-label" id="fileLabel">No file selected</span>
      <span class="status" id="status" style="display:none"></span>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="empty-state" id="emptyState">
        <span>📄</span>
        <p>Upload a PDF to get started</p>
      </div>
    </div>

    <div class="input-section">
      <input
        type="text"
        id="questionInput"
        placeholder="Ask a question about your PDF..."
        onkeydown="if(event.key==='Enter') sendQuestion()"
        disabled
      />
      <button class="send-btn" id="sendBtn" onclick="sendQuestion()" disabled>Send</button>
    </div>
  </div>

  <script>
    const API = "https://ask-my-pdf-67vy.onrender.com";
    let pdfReady = false;

    function setStatus(text, type) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className = `status ${type}`;
      el.style.display = "inline-block";
    }

    async function uploadPDF(input) {
      const file = input.files[0];
      if (!file) return;

      document.getElementById("fileLabel").textContent = file.name;
      setStatus("Processing...", "loading");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
        const data = await res.json();

        if (res.ok) {
          setStatus("✓ Ready", "ready");
          pdfReady = true;
          document.getElementById("questionInput").disabled = false;
          document.getElementById("sendBtn").disabled = false;
          document.getElementById("emptyState").style.display = "none";
          addMessage("bot", `✅ **${file.name}** is ready! Ask me anything about it.`);
        } else {
          setStatus("Error", "error");
          addMessage("bot", `❌ Upload failed: ${data.detail}`);
        }
      } catch (e) {
        setStatus("Error", "error");
        addMessage("bot", "❌ Could not connect to backend. Is it running?");
      }
    }

    async function sendQuestion() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();
      if (!question || !pdfReady) return;

      input.value = "";
      addMessage("user", question);

      // Show typing indicator
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.id = "typing";
      typing.textContent = "Thinking...";
      document.getElementById("chatWindow").appendChild(typing);
      scrollToBottom();

      try {
        const res = await fetch(`${API}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();

        document.getElementById("typing")?.remove();

        if (res.ok) {
          addMessage("bot", data.answer, data.chunks_used, data.grounded);
        } else {
          addMessage("bot", `❌ ${data.detail}`);
        }
      } catch (e) {
        document.getElementById("typing")?.remove();
        addMessage("bot", "❌ Could not reach the backend.");
      }
    }

    function addMessage(role, text, chunks, grounded) {
    const chatWindow = document.getElementById("chatWindow");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;

    if (chunks !== undefined) {
        const meta = document.createElement("div");
        meta.className = "chunks";
        meta.textContent = grounded
            ? `✅ Grounded • Based on ${chunks} chunks from your PDF`
            : `⚠️ Not grounded in document`;
        div.appendChild(meta);
    }

    chatWindow.appendChild(div);
    scrollToBottom();
}

    function scrollToBottom() {
      const cw = document.getElementById("chatWindow");
      cw.scrollTop = cw.scrollHeight;
    }
  </script>
</body>
</html>
